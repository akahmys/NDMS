<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS — Document Management System</title>

    <!-- ===== 外部ライブラリ (UMD / CDN) ===== -->
    <!-- UI ユーティリティ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- ドラッグ＆ドロップ -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- PDF 操作 -->
    <script src="https://unpkg.com/pdf-lib@latest/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- ===== グローバルスタイル ===== -->
    <style>
        /* Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap');

        /* CSS カスタムプロパティ */
        :root {
            --font-body:    'Inter',  sans-serif;
            --font-display: 'Outfit', sans-serif;
            --color-ink:    #1A1A1A;
            --color-paper:  #FDFCF8;
            --color-accent: #3b82f6;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-paper);
            color: var(--color-ink);
            overflow: hidden; /* メインレイアウトを画面内に収める */
        }

        h1, h2, h3 { font-family: var(--font-display); }

        /* ===== ツリービュー ===== */
        /* アクティブなツリー項目 */
        .tree-item-active {
            background-color: var(--color-ink);
            color: var(--color-paper);
            border-left: 3px solid var(--color-accent);
        }

        /* ドラッグ中のゴースト要素 */
        .sortable-ghost {
            opacity: 0.4;
            background-color: #dbeafe !important;
        }



        /* ===== スクロールバー (Webkit) ===== */
        .custom-scrollbar::-webkit-scrollbar       { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(26, 26, 26, 0.1);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(26, 26, 26, 0.2); }

        /* ===== ガラスカード ===== */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        /* ===== 共通コンポーネント ===== */
        .btn-ink {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            background-color: var(--color-ink); color: white;
            padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 700;
            transition: all 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-ink:hover { background-color: rgba(26, 26, 26, 0.8); }
        .btn-ink:active { transform: scale(0.95); }

        .btn-paper {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            background-color: transparent; color: var(--color-ink);
            padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 700;
            border: 1px solid rgba(26, 26, 26, 0.2);
            transition: all 0.2s;
        }
        .btn-paper:hover { background-color: rgba(26, 26, 26, 0.05); }
        .btn-paper:active { transform: scale(0.95); }

        .input-standard {
            width: 100%; padding: 0.375rem 0.625rem;
            background-color: transparent; border: 1px solid rgba(26, 26, 26, 0.1);
            border-radius: 0.375rem; font-size: 0.875rem; color: var(--color-ink);
            transition: all 0.2s;
        }
        .input-standard:focus { border-color: rgba(26, 26, 26, 0.4); outline: none; }
        .input-standard:disabled { opacity: 0.5; cursor: not-allowed; }

        .label-standard {
            display: block; font-size: 0.625rem; font-weight: 700;
            color: rgba(26, 26, 26, 0.4); text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 0.25rem;
        }

        /* ===== 動的生成要素用 ===== */
        .tree-node-header {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.375rem 0.75rem; cursor: pointer;
            font-size: 0.875rem; font-weight: 700; color: var(--color-ink);
            transition: all 0.2s;
        }
        .tree-node-header:hover { background-color: rgba(26, 26, 26, 0.05); }

        .tree-file {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.375rem 0.75rem; border-radius: 0.5rem;
            cursor: pointer; font-size: 0.875rem; color: rgba(26, 26, 26, 0.7);
            transition: all 0.2s; border-left: 2px solid transparent;
        }
        .tree-file:hover { background-color: rgba(26, 26, 26, 0.05); }
        .tree-file.active {
            background-color: var(--color-ink); color: var(--color-paper);
            font-weight: 700; border-left-color: var(--color-accent);
        }

        .thumb-card {
            position: relative; display: flex; flex-direction: column; gap: 0.75rem;
            cursor: pointer; padding: 0.75rem; border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .thumb-card:hover { background-color: white; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transform: translateY(-4px); }
        .thumb-card.selected {
            background-color: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 0 2px #3b82f6, 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            transform: scale(1.02); z-index: 10;
        }

        .modal-overlay {
            position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px); z-index: 100;
            display: flex; align-items: center; justify-content: center; padding: 1.5rem;
        }
        .modal-dialog {
            background-color: var(--color-paper); width: 100%; max-width: 42rem;
            border-radius: 1.5rem; border: 1px solid rgba(26, 26, 26, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden; animation: fadeIn 0.3s ease-out;
        }

        /* PDF サムネイル影 */
        .thumbnail-img {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        /* ===== フェードインアニメーション ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>

    <!-- ===== Tailwind カスタム設定 ===== -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontSize: {
                        'tiny':  '0.625rem', /* 10px */
                        'micro': '0.5rem',   /* 8px  */
                    },
                    colors: {
                        ink:    '#1A1A1A',
                        paper:  '#FDFCF8',
                        accent: '#3b82f6',
                        // 互換性維持用
                        'dms-dark': '#1A1A1A',
                        'dms-bg':   '#FDFCF8',
                    },
                },
            },
        };
    </script>
</head>

<body class="h-screen flex flex-col">

    <!-- ================================================================
         アプリケーションロジック
    ================================================================ -->
    <script>
    'use strict';

    /* ================================================================
     * ███████████████████████████████████████████████████████████████
     *  Utils — 共通ユーティリティ（静的メソッド群）
     * ███████████████████████████████████████████████████████████████
     * ================================================================ */
    class Utils {
        /**
         * UUID 互換の一意な ID を生成する。
         * crypto.randomUUID が利用できない環境では乱数ベースで代替する。
         * @returns {string} UUID 文字列
         */
        static id() {
            return typeof crypto.randomUUID === 'function'
                ? crypto.randomUUID()
                : Math.random().toString(36).slice(2) + Date.now().toString(36);
        }

        /**
         * 文字列に Unicode NFC 正規化を適用する。
         * macOS（NFD）と Windows（NFC）の間でファイル名の不整合が起きるため、
         * ファイル名を扱う際は必ずこの関数を通す。
         * @param {*} str 対象文字列
         * @returns {*} 正規化後の文字列（文字列以外はそのまま返す）
         */
        static norm(str) {
            return typeof str === 'string' ? str.normalize('NFC') : str;
        }

        /**
         * Windows の禁則文字 (\/:*?"<>|) を アンダースコアに置換し、
         * ファイルシステムで安全なパス名を返す。
         * @param {string} name 元のファイル名
         * @returns {string} サニタイズ済み文字列
         */
        static sanitize(name) {
            return this.norm(name).replace(/[\/\\:\*\?"<>|]/g, '_').trim();
        }
    }


    /* ================================================================
     * ███████████████████████████████████████████████████████████████
     *  FileSystemService — File System Access API ラッパー
     * ███████████████████████████████████████████████████████████████
     *
     *  ブラウザ標準の File System Access API を薄くラップし、
     *  NFC 正規化・エラーハンドリング・ルートディレクトリ解決を
     *  一元管理する。
     *
     *  主な操作:
     *    selectDirectory / readFileAsText / writeFile
     *    listEntries / listFiles / listDirectories
     *    createDirectory / moveAndRenameFile / removeDirectory
     *    readFileAsUrl
     * ================================================================ */
    class FileSystemService {
        constructor() {
            /** @type {FileSystemDirectoryHandle|null} 選択中のルートフォルダハンドル */
            this.directoryHandle = null;
        }

        // ──────────────────────────────────────────────
        //  ディレクトリ選択
        // ──────────────────────────────────────────────

        /**
         * OS のフォルダ選択ダイアログを開き、選択したフォルダハンドルを返す。
         * キャンセル時は null を返す。
         * @returns {Promise<FileSystemDirectoryHandle|null>}
         */
        async selectDirectory() {
            try {
                this.directoryHandle = await window.showDirectoryPicker();
                return this.directoryHandle;
            } catch (e) {
                // ユーザーキャンセルは通常エラーとして扱わない
                console.error('[FS] Directory selection failed or cancelled', e);
                return null;
            }
        }

        // ──────────────────────────────────────────────
        //  ファイル読み書き
        // ──────────────────────────────────────────────

        /**
         * ルートフォルダ直下の指定ファイルをテキストとして読み込む。
         * NFC 正規化を適用してから検索するため、Mac/Windows 差異を吸収する。
         * @param {string} fileName ファイル名
         * @returns {Promise<string|null>} テキスト内容、または null
         */
        async readFileAsText(fileName) {
            if (!this.directoryHandle) return null;
            const name = Utils.norm(fileName);
            try {
                const fileHandle = await this.directoryHandle.getFileHandle(name);
                const file = await fileHandle.getFile();
                return await file.text();
            } catch {
                return null; // ファイルが存在しない場合は null を返す
            }
        }

        /**
         * ルートフォルダ直下または相対パスにファイルを書き込む（上書き）。
         * サブフォルダ付きパス（例: "category/file.pdf"）にも対応する。
         * @param {string} filePath ファイルパス（ルート相対）
         * @param {string|ArrayBuffer} content 書き込む内容
         * @returns {Promise<boolean>} 成功なら true
         */
        async writeFile(filePath, content) {
            if (!this.directoryHandle) return false;
            const normPath = Utils.norm(filePath);
            try {
                // パスを分解してサブフォルダを順番に開く
                const parts = normPath.split('/').filter(Boolean);
                const fileName = parts.pop();
                let dirHandle = this.directoryHandle;
                for (const part of parts) {
                    dirHandle = await dirHandle.getDirectoryHandle(Utils.norm(part), { create: true });
                }
                const fileHandle = await dirHandle.getFileHandle(Utils.norm(fileName), { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(content);
                await writable.close();
                return true;
            } catch {
                return false;
            }
        }

        // ──────────────────────────────────────────────
        //  ディレクトリ列挙
        // ──────────────────────────────────────────────

        /**
         * 指定フォルダ配下のエントリ（ファイル＋ディレクトリ）を取得する。
         * dirName が null の場合はルートフォルダを対象とする。
         * @param {string|null} dirPath サブフォルダパス（null = ルート、例: "A/B"）
         * @returns {Promise<Array<{name:string, kind:'file'|'directory'}>>}
         */
        async listEntries(dirPath = null) {
            if (!this.directoryHandle) return [];
            try {
                let targetHandle = this.directoryHandle;
                if (dirPath) {
                    const parts = Utils.norm(dirPath).split('/').filter(Boolean);
                    for (const part of parts) {
                        targetHandle = await targetHandle.getDirectoryHandle(part).catch(() => null);
                        if (!targetHandle) return [];
                    }
                }
                const entries = [];
                for await (const entry of targetHandle.values()) {
                    entries.push({
                        name: Utils.norm(entry.name), // 取得時も必ず NFC 正規化
                        kind: entry.kind,             // 'file' | 'directory'
                    });
                }
                return entries;
            } catch (e) {
                console.error(`[FS] listEntries(${dirPath || 'root'}) failed`, e);
                return [];
            }
        }

        /**
         * 指定フォルダ内のファイル名一覧を返す。
         * @param {string|null} dirName サブフォルダ名（null = ルート）
         */
        async listFiles(dirName = null) {
            const entries = await this.listEntries(dirName);
            return entries.filter(e => e.kind === 'file').map(e => e.name);
        }

        /**
         * 指定フォルダ内のサブフォルダ名一覧を返す。
         * @param {string|null} dirName サブフォルダ名（null = ルート）
         */
        async listDirectories(dirName = null) {
            const entries = await this.listEntries(dirName);
            return entries.filter(e => e.kind === 'directory').map(e => e.name);
        }

        // ──────────────────────────────────────────────
        //  ディレクトリ操作
        // ──────────────────────────────────────────────

        /**
         * パスに従ってディレクトリを再帰的に作成する（既存の場合は何もしない）。
         * @param {string} dirPath フォルダパス（例: "Parent/Child"）
         * @returns {Promise<boolean>} 成功なら true
         */
        async createDirectory(dirPath) {
            if (!this.directoryHandle) return false;
            try {
                const parts = Utils.norm(dirPath).split('/').filter(Boolean);
                let current = this.directoryHandle;
                for (const part of parts) {
                    current = await current.getDirectoryHandle(part, { create: true });
                }
                return true;
            } catch (e) {
                console.error(`[FS] createDirectory(${dirPath}) failed`, e);
                return false;
            }
        }

        /**
         * 物理ディレクトリのリネーム・移動を行う。
         * @param {string} oldPath 元のパス
         * @param {string} newPath 新しいパス
         */
        async renameDirectory(oldPath, newPath) {
            if (!this.directoryHandle) return false;
            try {
                const oldNorm = Utils.norm(oldPath);
                const newNorm = Utils.norm(newPath);
                if (oldNorm === newNorm) return true;

                // 移動元のハンドル取得
                const oldParts = oldNorm.split('/').filter(Boolean);
                const oldName  = oldParts.pop();
                let oldParent  = this.directoryHandle;
                for (const p of oldParts) {
                    oldParent = await oldParent.getDirectoryHandle(p);
                }
                const dirHandle = await oldParent.getDirectoryHandle(oldName);

                // 移動先の親ハンドル取得
                const newParts = newNorm.split('/').filter(Boolean);
                const newName  = newParts.pop();
                let newParent  = this.directoryHandle;
                for (const p of newParts) {
                    newParent = await newParent.getDirectoryHandle(p, { create: true });
                }

                if (typeof dirHandle.move === 'function') {
                    await dirHandle.move(newParent, newName);
                } else {
                    // フォールバック: 再帰的コピー → 旧フォルダ削除
                    // ブラウザがディレクトリの move() に対応していない場合の対応策
                    console.warn('[FS] Directory move not supported. Falling back to recursive copy.');
                    
                    const _copyRecursive = async (srcHandle, destParentHandle, targetName) => {
                        const destHandle = await destParentHandle.getDirectoryHandle(targetName, { create: true });
                        for await (const entry of srcHandle.values()) {
                            if (entry.kind === 'file') {
                                const file = await entry.getFile();
                                const newFileHandle = await destHandle.getFileHandle(entry.name, { create: true });
                                const writable = await newFileHandle.createWritable();
                                await writable.write(file);
                                await writable.close();
                            } else if (entry.kind === 'directory') {
                                await _copyRecursive(entry, destHandle, entry.name);
                            }
                        }
                    };

                    await _copyRecursive(dirHandle, newParent, newName);
                    await oldParent.removeEntry(oldName, { recursive: true });
                }
                return true;
            } catch (e) {
                console.error(`[FS] renameDirectory failed: ${oldPath} -> ${newPath}`, e);
                return false;
            }
        }

        /**
         * ルートフォルダ直下のフォルダを再帰的に削除する。
         * @param {string} dirName フォルダ名
         * @returns {Promise<boolean>} 成功なら true
         */
        async removeDirectory(dirName) {
            if (!this.directoryHandle) return false;
            try {
                await this.directoryHandle.removeEntry(Utils.norm(dirName), { recursive: true });
                return true;
            } catch (e) {
                console.error(`[FS] removeDirectory(${dirName}) failed`, e);
                return false;
            }
        }

        // ──────────────────────────────────────────────
        //  ファイル移動・リネーム
        // ──────────────────────────────────────────────

        /**
         * ファイルを別フォルダへ移動し、必要に応じてリネームする。
         *
         * targetDirPath が空文字の場合はルートフォルダへの移動を意味する。
         *
         * 処理順:
         *  1. sourcePath をパーツに分解して元ファイルハンドルを取得
         *  2. targetDirPath からターゲットディレクトリハンドルを取得
         *  3. fileHandle.move() が使えれば API で移動、
         *     使えない場合は コピー → 旧ファイル削除 のフォールバック
         *
         * @param {string} sourcePath   移動元パス（例: "category/file.pdf"）
         * @param {string} targetDirPath 移動先フォルダ名（空文字 = ルート）
         * @param {string} newFileName   新しいファイル名
         * @returns {Promise<boolean>} 成功なら true
         */
        async moveAndRenameFile(sourcePath, targetDirPath, newFileName) {
            if (!this.directoryHandle) return false;
            try {
                const sourceNorm  = Utils.norm(sourcePath);
                const newNameNorm = Utils.norm(newFileName);

                // -- 1. 移動元のファイルハンドルを取得 --
                const sourceParts = sourceNorm.split('/').filter(Boolean);
                const sourceName  = sourceParts.pop();
                let sourceDirHandle = this.directoryHandle;
                for (const part of sourceParts) {
                    sourceDirHandle = await sourceDirHandle.getDirectoryHandle(Utils.norm(part));
                }
                const sourceFileHandle = await sourceDirHandle.getFileHandle(sourceName);

                // -- 2. 移動先のディレクトリハンドルを取得 --
                //    空文字の場合はルートディレクトリを指す
                const targetNorm = Utils.norm(targetDirPath);
                const targetDirHandle = targetNorm
                    ? await this.directoryHandle.getDirectoryHandle(targetNorm)
                    : this.directoryHandle;

                // -- 3. ファイル移動 --
                if (typeof sourceFileHandle.move === 'function') {
                    // モダンブラウザの FileSystemFileHandle.move() を使用
                    await sourceFileHandle.move(targetDirHandle, newNameNorm);
                } else {
                    // フォールバック: 読み込み → 書き込み → 旧ファイル削除
                    const file = await sourceFileHandle.getFile();
                    const newFileHandle = await targetDirHandle.getFileHandle(newNameNorm, { create: true });
                    const writable = await newFileHandle.createWritable();
                    await writable.write(file);
                    await writable.close();
                    await sourceDirHandle.removeEntry(sourceName);
                }
                return true;
            } catch (e) {
                console.error(`[FS] moveAndRenameFile failed: ${sourcePath} → ${targetDirPath}/${newFileName}`, e);
                return false;
            }
        }

        // ──────────────────────────────────────────────
        //  ファイルプレビュー用 URL
        // ──────────────────────────────────────────────

        /**
         * 指定パスのファイルを Object URL として返す（iframe / img でのプレビュー用）。
         * 呼び出し側は不要になった時点で URL.revokeObjectURL() を呼ぶことが望ましい。
         * @param {string} path ルート相対パス（例: "category/file.pdf"）
         * @returns {Promise<string|null>} Object URL、または null
         */
        async readFileAsUrl(path) {
            if (!this.directoryHandle) return null;
            try {
                const normPath = Utils.norm(path);
                const parts = normPath.split('/').filter(Boolean);
                const fileName = parts.pop();
                let targetHandle = this.directoryHandle;
                for (const part of parts) {
                    targetHandle = await targetHandle.getDirectoryHandle(Utils.norm(part));
                }
                const fileHandle = await targetHandle.getFileHandle(fileName);
                const file = await fileHandle.getFile();
                return URL.createObjectURL(file);
            } catch (e) {
                console.error('[FS] readFileAsUrl failed', e, path);
                return null;
            }
        }
    }


    /* ================================================================
     * ███████████████████████████████████████████████████████████████
     *  ProjectService — プロジェクトメタデータ管理
     * ███████████████████████████████████████████████████████████████
     *
     *  project.json をルートフォルダに保存し、以下を管理する:
     *    - config  : プロジェクト全体設定（案件名・受注番号・WBS 等）
     *    - categories : フォルダ定義（ID・名前・物理パス・コード）
     *    - documents  : 書類登録情報（カテゴリID・ファイル名・日付等）
     *
     *  主な責務:
     *    init / save / syncFilePositions
     *    addDocument / addCategory / updateCategory / deleteCategory
     *    generateNumber / doesFileExistInCategory
     *    createDefaultDirectories
     * ================================================================ */
    class ProjectService {
        /** メタデータファイル名（ルートフォルダ直下に保存） */
        static METADATA_FILENAME = 'project.json';

        /**
         * フォルダ構成テンプレート定義。
         * 「フォルダ構成変更」機能で使用する。
         * @type {Record<string, {name:string, categories:Array}>}
         */
        static TEMPLATES = {
            'hes-0010-02': {
                name: '荏原標準（HES-0010-02）',
                categories: [
                    { id: 'spec',   name: '製作仕様書',         path: '製作仕様書'         },
                    { id: 'gen',    name: '装置関係図',         path: '装置関係図'         },
                    { id: 'main',   name: '主機関係',           path: '主機関係'           },
                    { id: 'aux',    name: '捕機関係',           path: '捕機関係'           },
                    { id: 'supp',   name: '付帯設備関係',       path: '付帯設備関係'       },
                    { id: 'elec',   name: '電気関係',           path: '電気関係'           },
                    { id: 'calc',   name: '検討及び計算書',     path: '検討及び計算書'     },
                    { id: 'manual', name: '取扱説明書',         path: '取扱説明書'         },
                    { id: 'test',   name: '試験及び検査成績書', path: '試験及び検査成績書' },
                    { id: 'other',  name: 'その他',             path: 'その他'             },
                ],
            },
            'pump-car': {
                name: '荏原標準（排水ポンプ車）',
                categories: [
                    { id: 'p-spec',   name: '製作仕様',     path: '製作仕様'     },
                    { id: 'p-insp',   name: '車検証等',     path: '車検証等'     },
                    { id: 'p-photo',  name: '納入写真',     path: '納入写真'     },
                    { id: 'p-record', name: '検査記録',     path: '検査記録'     },
                    { id: 'p-manual', name: '取扱説明書',   path: '取扱説明書'   },
                    { id: 'p-parts',  name: '部品表',       path: '部品表'       },
                ],
            },
        };

        /**
         * @param {FileSystemService} fs FileSystemService インスタンス
         */
        constructor(fs) {
            this.fs = fs;
            /** @type {object|null} 読み込み済みメタデータ */
            this.metadata = null;
        }

        // ──────────────────────────────────────────────
        //  初期メタデータ
        // ──────────────────────────────────────────────

        /**
         * 新規プロジェクト用のデフォルトメタデータオブジェクトを返す。
         * @returns {object}
         */
        _getInitialMetadata() {
            return {
                version: '2.0.0',
                config: {
                    projectName:  'My DMS Project',
                    orderNumber:  '',
                    wbs:          '',
                    customer:     '',
                    user:         '',
                    customFields: [],
                },
                // デフォルトは hes-0010-02 テンプレートを使用
                categories: ProjectService.TEMPLATES['hes-0010-02'].categories
                    .map((c, i) => ({ ...c, displayOrder: i })),
                documents: [],
            };
        }

        // ──────────────────────────────────────────────
        //  初期化（フォルダ読み込み時に呼ぶ）
        // ──────────────────────────────────────────────

        /**
         * プロジェクトの初期化処理。以下の3パターンを自動判別する:
         *
         *  1. project.json 存在 → メタデータ読み込み後に物理同期
         *  2. project.json 無し・既存フォルダあり → ディスカバリーモード
         *     （既存サブフォルダをカテゴリとして自動登録）
         *  3. project.json 無し・フォルダ無し → 自動セットアップモード
         *     （標準テンプレートのフォルダ一式を新規作成）
         *
         * @returns {Promise<'LOADED'|'CREATED'>} 初期化モード
         * @throws {Error} JSON パース失敗時
         */
        async init() {
            try {
                const metadataRaw = await this.fs.readFileAsText(ProjectService.METADATA_FILENAME);
                const folderName  = this.fs.directoryHandle.name;

                if (metadataRaw) {
                    // ── ケース 1: project.json が存在する ──
                    return await this._loadExisting(metadataRaw, folderName);
                } else {
                    // ── ケース 2 / 3: project.json が存在しない ──
                    return await this._initNew(folderName);
                }
            } catch (err) {
                console.error('[Project] init() failed:', err);
                throw err;
            }
        }

        /**
         * 既存の project.json を解析してメタデータを復元する。
         * 後方互換のため、不足しているキーはデフォルト値で補う。
         * @private
         */
        async _loadExisting(raw, folderName) {
            let parsed;
            try {
                parsed = JSON.parse(raw);
            } catch (e) {
                throw new Error('project.json の解析に失敗しました: ' + e.message);
            }

            // 許可キーのみを抽出して config を再構築
            const ALLOWED_CONFIG_KEYS = [
                'projectName', 'orderNumber', 'wbs',
                'customer', 'user',
                'customFields',
            ];
            const defaultConfig = this._getInitialMetadata().config;
            const cleanConfig   = {};

            // 旧形式 (customField1/2/3) からの移行
            if (parsed.config && !parsed.config.customFields) {
                parsed.config.customFields = [];
                for (let i = 1; i <= 3; i++) {
                    const val = parsed.config[`customField${i}`];
                    const lbl = parsed.config[`customLabel${i}`];
                    if (val !== undefined || lbl !== undefined) {
                        parsed.config.customFields.push({
                            label: lbl || `カスタム項目${i}`,
                            value: val || '',
                        });
                    }
                }
            }

            for (const key of ALLOWED_CONFIG_KEYS) {
                cleanConfig[key] = parsed.config?.[key] ?? defaultConfig[key] ?? (key === 'customFields' ? [] : '');
            }
            parsed.config     = cleanConfig;
            parsed.categories = parsed.categories ?? [];
            parsed.documents  = parsed.documents  ?? [];

            // 互換性担保: parentId がない場合は null をセット
            parsed.categories.forEach(cat => {
                if (cat.parentId === undefined) cat.parentId = null;
            });

            // プロジェクト名が未設定またはデフォルト値なら、フォルダ名を使用
            if (!parsed.config.projectName || parsed.config.projectName === 'My DMS Project') {
                parsed.config.projectName = folderName;
            }

            this.metadata = parsed;
            await this.syncFilePositions();
            return 'LOADED';
        }

        /**
         * project.json が存在しない場合の初期化。
         * 既存フォルダを発見した場合はディスカバリーモード、
         * それ以外は標準テンプレートで自動セットアップする。
         * @private
         */
        async _initNew(folderName) {
            const existingDirs = await this.fs.listDirectories();
            // 隠しフォルダ（.DS_Store 等）は除外
            const validDirs = existingDirs.filter(d => !d.startsWith('.'));

            if (validDirs.length > 0) {
                // ── ディスカバリーモード: 既存フォルダをカテゴリとして登録 ──
                console.log(`[Project] Discovery mode: ${validDirs.length} dirs found`);
                const initial  = this._getInitialMetadata();
                this.metadata  = {
                    version: '2.0.0',
                    config: { ...initial.config, projectName: folderName },
                    categories: validDirs.sort().map((dir, i) => ({
                        id:           Utils.id().slice(0, 7),
                        name:         Utils.norm(dir),
                        path:         Utils.norm(dir),
                        displayOrder: i,
                    })),
                    documents: [],
                };
            } else {
                // ── 自動セットアップモード: 標準テンプレートでフォルダ一式を作成 ──
                console.log('[Project] Auto-setup mode: creating standard folders');
                this.metadata = this._getInitialMetadata();
                this.metadata.config.projectName = folderName;
                await this.createDefaultDirectories();
            }

            await this.save();
            await this.syncFilePositions();
            return 'CREATED';
        }

        // ──────────────────────────────────────────────
        //  保存・フォルダ作成
        // ──────────────────────────────────────────────

        /**
         * 現在のメタデータを project.json としてルートフォルダに保存する。
         */
        async save() {
            if (!this.metadata) return;
            await this.fs.writeFile(
                ProjectService.METADATA_FILENAME,
                JSON.stringify(this.metadata, null, 2),
            );
        }

        /**
         * metadata.categories に定義された全フォルダを物理的に作成する。
         * 既存フォルダがある場合は何もしない。
         */
        async createDefaultDirectories() {
            for (const cat of this.metadata.categories) {
                await this.fs.createDirectory(cat.path);
            }
        }

        // ──────────────────────────────────────────────
        //  ファイルシステムと project.json の同期
        // ──────────────────────────────────────────────

        /**
         * 物理ファイルシステムとメタデータ（project.json）を同期する。
         *
         * 実行内容:
         *  1. ルートおよび全カテゴリフォルダの PDF を収集し、物理ファイルマップを作成
         *  2. メタデータ登録済み書類を照合し、ルートに戻されたものは登録解除
         *  3. カテゴリ間移動を検出してメタデータの categoryId を追従
         *  4. 物理的に存在するが未登録のファイルを自動登録（外部投入の救済）
         *  5. 変更があれば save() を実行
         *
         * @returns {Promise<boolean>} メタデータに変更があれば true
         */
        async syncFilePositions() {
            if (!this.metadata) return false;
            try {
                // -- 1. 全 PDF ファイルを収集: Map<fileName, categoryId|null> --
                //    ルートにある場合は null、カテゴリフォルダにある場合はそのカテゴリ ID
                const physicalMap = new Map();

                // ルート直下の PDF
                const rootFiles = await this.fs.listFiles();
                for (const f of rootFiles) {
                    if (this._isValidPdf(f) && f !== ProjectService.METADATA_FILENAME) {
                        physicalMap.set(Utils.norm(f), null);
                    }
                }

                // 各カテゴリフォルダ内の PDF
                for (const cat of this.metadata.categories) {
                    const catFiles = await this.fs.listFiles(cat.path);
                    for (const f of catFiles) {
                        if (this._isValidPdf(f)) {
                            physicalMap.set(Utils.norm(f), cat.id);
                        }
                    }
                }

                // -- 2 & 3. メタデータ登録済み書類を照合 --
                let changed = false;
                const registeredNames = new Set();
                const nextDocuments   = [];

                for (const doc of this.metadata.documents) {
                    const normName   = Utils.norm(doc.fileName);
                    const actualCatId = physicalMap.get(normName);

                    // 同一ファイル名の重複登録があれば最初の1つだけを維持する
                    if (registeredNames.has(normName)) {
                        console.warn(`[Project] Sync: Duplicate document entry for ${normName}, removing extra`);
                        changed = true;
                        continue;
                    }

                    if (physicalMap.has(normName)) {
                        if (actualCatId === null) {
                            // ルートに戻された → 登録解除（未分類として再検出される）
                            console.log(`[Project] Sync: unregistered ${normName} (moved to root)`);
                            changed = true;
                            // nextDocuments に追加しない = 登録解除
                        } else {
                            // カテゴリ間移動の追従
                            if (doc.categoryId !== actualCatId) {
                                console.log(`[Project] Sync: ${normName} moved → ${actualCatId}`);
                                doc.categoryId = actualCatId;
                                changed = true;
                            }
                            nextDocuments.push(doc);
                            registeredNames.add(normName);
                        }
                    } else {
                        // 物理ファイルが存在しない → メタデータから登録解除
                        console.warn(`[Project] Sync: missing ${normName}, removing from metadata`);
                        changed = true;
                        // nextDocuments に追加しない = 登録解除
                    }
                }
                this.metadata.documents = nextDocuments;

                // -- 4. カテゴリフォルダに存在するが未登録のファイルを自動登録 --
                //    エクスプローラ等で直接投入されたファイルの救済措置
                for (const [fileName, catId] of physicalMap.entries()) {
                    if (catId && !registeredNames.has(fileName)) {
                        console.log(`[Project] Sync: auto-registering ${fileName} in ${catId}`);
                        const catDocs = this.metadata.documents.filter(d => d.categoryId === catId);
                        this.metadata.documents.push({
                            id:           Utils.id(),
                            categoryId:   catId,
                            fileName:     fileName,
                            originalName: fileName,
                            date:         new Date().toISOString().split('T')[0],
                            sortOrder:    catDocs.length,
                            number:       '', // 自動採番は廃止、手動管理とする
                            isAutoAdded:  true,
                        });
                        changed = true;
                    }
                }

                if (changed) await this.save();
                return changed;
            } catch (e) {
                console.error('[Project] syncFilePositions failed:', e);
                throw e;
            }
        }

        /**
         * ファイル名が「有効な PDF」かどうかを判定するフィルタ。
         * 隠しファイル・システムファイルを除外する。
         * @private
         */
        _isValidPdf(fileName) {
            const SYSTEM_FILES = ['Thumbs.db', 'desktop.ini', '.DS_Store'];
            return (
                fileName.toLowerCase().endsWith('.pdf') &&
                !fileName.startsWith('.') &&
                !SYSTEM_FILES.includes(fileName)
            );
        }

        // ──────────────────────────────────────────────
        //  書類管理
        // ──────────────────────────────────────────────

        /**
         * 書類をメタデータに追加し、project.json を保存する。
         * @param {{ categoryId:string, fileName:string, originalName:string, number?:string }} docData
         * @returns {Promise<object>} 追加された書類オブジェクト
         */
        async addDocument(docData) {
            const catDocs = this.metadata.documents.filter(d => d.categoryId === docData.categoryId);
            const newDoc  = {
                id:           Utils.id(),
                categoryId:   docData.categoryId,
                fileName:     Utils.norm(docData.fileName),
                originalName: Utils.norm(docData.originalName),
                date:         new Date().toISOString().split('T')[0],
                sortOrder:    catDocs.length,
                number:       '',
            };
            this.metadata.documents.push(newDoc);
            await this.save();
            return newDoc;
        }

        /**
         * 指定カテゴリ内に同名ファイルが物理的に存在するか確認する。
         * @param {string} categoryId カテゴリ ID
         * @param {string} fileName   確認するファイル名
         * @returns {Promise<boolean>}
         */
        async doesFileExistInCategory(categoryId, fileName) {
            const cat = this.metadata.categories.find(c => c.id === categoryId);
            if (!cat) return false;
            const files = await this.fs.listFiles(cat.path);
            return files.includes(Utils.norm(fileName));
        }

        // ──────────────────────────────────────────────
        //  採番
        // ──────────────────────────────────────────────



        // ──────────────────────────────────────────────
        //  カテゴリ管理
        // ──────────────────────────────────────────────

        /**
         * 新規カテゴリを追加する（階層対応）。
         * @param {string} name カテゴリ名
         * @param {string|null} parentId 親カテゴリ ID
         * @returns {Promise<object>} 追加されたカテゴリオブジェクト
         */
        async addCategory(name, parentId = null) {
            const safeName = Utils.sanitize(name);
            const id       = Utils.id().slice(0, 7);
            
            let path = safeName;
            if (parentId) {
                const parent = this.metadata.categories.find(c => c.id === parentId);
                if (parent) {
                    path = `${parent.path}/${safeName}`;
                }
            }

            const newCat   = {
                id,
                parentId,
                name:         safeName,
                path:         path,
                displayOrder: this.metadata.categories.length,
            };
            this.metadata.categories.push(newCat);
            const success = await this.fs.createDirectory(newCat.path);
            if (!success) {
                this.metadata.categories.pop();
                throw new Error('フォルダの作成に失敗しました。');
            }
            await this.save();
            return newCat;
        }

        /**
         * カテゴリの名前・コード・親子関係を更新する。
         * 名前や親が変わった場合、再帰的にパスを更新する。
         */
        async updateCategory(id, updates) {
            const cat = this.metadata.categories.find(c => c.id === id);
            if (!cat) return false;

            const oldPath = cat.path;
            let pathChanged = false;

            if (updates.name && updates.name !== cat.name) {
                cat.name = Utils.sanitize(updates.name);
                pathChanged = true;
            }
            if (updates.parentId !== undefined && updates.parentId !== cat.parentId) {
                cat.parentId = updates.parentId;
                pathChanged = true;
            }

            if (pathChanged) {
                // 新しいパスを算出
                let newPath = cat.name;
                if (cat.parentId) {
                    const parent = this.metadata.categories.find(c => c.id === cat.parentId);
                    if (parent) newPath = `${parent.path}/${cat.name}`;
                }
                
                // 物理ディレクトリの移動・リネーム
                const fsSuccess = await this.fs.renameDirectory(oldPath, newPath);
                if (!fsSuccess) {
                    // 物理操作に失敗した場合はメタデータを戻す（簡易的な整合性維持）
                    alert('物理フォルダの移動に失敗しました。');
                    return false;
                }
                
                // メタデータのパス更新（子カテゴリも再帰的に）
                const updateChildren = (pid, parentPath) => {
                    const children = this.metadata.categories.filter(c => c.parentId === pid);
                    for (const child of children) {
                        const childNewPath = `${parentPath}/${child.name}`;
                        child.path = childNewPath;
                        updateChildren(child.id, childNewPath);
                    }
                };
                cat.path = newPath;
                updateChildren(cat.id, newPath);
            }

            await this.save();
            await this.syncFilePositions();
            return true;
        }

        /**
         * カテゴリを削除する。
         *
         * 処理順:
         *  1. カテゴリ内書類を物理的にルートへ移動
         *  2. メタデータから書類を削除（syncFilePositions で再検出される）
         *  3. メタデータからカテゴリを削除
         *  4. 物理フォルダを削除
         *
         * @param {string} id カテゴリ ID
         * @returns {Promise<boolean>} 成功なら true
         */
        async deleteCategory(id) {
            const cat = this.metadata.categories.find(c => c.id === id);
            if (!cat) return false;

            // 1. カテゴリ内書類を物理的にルートへ移動
            const docs = this.metadata.documents.filter(d => d.categoryId === id);
            for (const doc of docs) {
                const success = await this.fs.moveAndRenameFile(
                    `${cat.path}/${doc.fileName}`,
                    '', // 空文字 = ルート
                    doc.fileName,
                );
                if (!success) {
                    console.warn(`[Project] deleteCategory: failed to move ${doc.fileName} to root`);
                }
            }

            // 2 & 3. メタデータから削除
            this.metadata.categories = this.metadata.categories.filter(c => c.id !== id);
            this.metadata.documents  = this.metadata.documents.filter(d => d.categoryId !== id);

            // 4. 物理フォルダを削除
            await this.fs.removeDirectory(cat.path);
            await this.save();
            return true;
        }
    }


    /* ================================================================
     * ███████████████████████████████████████████████████████████████
     *  PdfService — PDF 結合・成果物生成
     * ███████████████████████████████████████████████████████████████
     *
     *  pdf-lib を使用してプロジェクト内の全 PDF を 1 ファイルに結合し、
     *  先頭に目次ページを付与した成果物を生成する。
     * ================================================================ */
    class PdfService {
        /**
         * @param {FileSystemService} fs
         */
        constructor(fs) {
            this.fs = fs;
        }

        /**
         * プロジェクト内の全 PDF を結合し、目次付き成果物バイト列を返す。
         *
         * 処理順:
         *  1. 目次ページを予約して空の結合 PDF を作成
         *  2. カテゴリ順・ソート順で書類を並び替え
         *  3. 各 PDF を順番に読み込んで結合し、目次情報を記録
         *  4. 目次ページにテキストを描画
         *
         * @param {object[]} documents  登録済み書類リスト
         * @param {object[]} categories カテゴリ定義リスト
         * @param {{ title?:string }} [options]
         * @returns {Promise<Uint8Array>} 結合済み PDF バイト列
         */
        async mergeProjectPdfs(documents, categories, options = {}) {
            const { PDFDocument, StandardFonts } = PDFLib;
            const mergedPdf = await PDFDocument.create();
            const tocEntries = [];
            let currentPageOffset = 1; // 目次ページの分を 1 から開始

            // -- 1. 先頭に目次ページを予約 --
            const tocPage = mergedPdf.addPage();
            const { width, height } = tocPage.getSize();
            const titleFont = await mergedPdf.embedFont(StandardFonts.HelveticaBold);

            // -- 2. カテゴリ順 → ソート順 で書類を並び替え --
            const sortedDocs = [...documents].sort((a, b) => {
                const catA = categories.find(c => c.id === a.categoryId);
                const catB = categories.find(c => c.id === b.categoryId);
                if (catA.displayOrder !== catB.displayOrder) {
                    return catA.displayOrder - catB.displayOrder;
                }
                return (a.sortOrder || 0) - (b.sortOrder || 0);
            });

            // -- 3. 各 PDF を結合 --
            for (const doc of sortedDocs) {
                const cat = categories.find(c => c.id === doc.categoryId);
                try {
                    const dirHandle  = await this.fs.directoryHandle.getDirectoryHandle(Utils.norm(cat.path));
                    const fileHandle = await dirHandle.getFileHandle(Utils.norm(doc.fileName));
                    const fileBytes  = await (await fileHandle.getFile()).arrayBuffer();
                    const donorPdf   = await PDFDocument.load(fileBytes);

                    const pageIndices  = donorPdf.getPageIndices();
                    const copiedPages  = await mergedPdf.copyPages(donorPdf, pageIndices);

                    // 目次エントリを記録
                    tocEntries.push({
                        title:     doc.fileName,
                        number:    doc.number,
                        startPage: currentPageOffset + 1, // 目次ページ分 +1
                    });

                    copiedPages.forEach(page => mergedPdf.addPage(page));
                    currentPageOffset += pageIndices.length;
                } catch (err) {
                    console.error(`[PDF] merge failed: ${doc.fileName}`, err);
                }
            }

            // -- 4. 目次ページを描画 --
            tocPage.drawText(options.title || 'Project Documents', {
                x: 50, y: height - 50, size: 20, font: titleFont,
            });

            const bodyFont = await mergedPdf.embedFont(StandardFonts.Helvetica);
            let yPos = height - 100;
            for (const entry of tocEntries) {
                if (yPos < 50) break; // ページ溢れ防止（簡易版）
                const label = entry.number ? `${entry.number}  ${entry.title}` : entry.title;
                tocPage.drawText(label, {
                    x: 50, y: yPos, size: 10, font: bodyFont,
                });
                tocPage.drawText(String(entry.startPage), {
                    x: width - 60, y: yPos, size: 10, font: bodyFont,
                });
                yPos -= 18;
            }

            return await mergedPdf.save();
        }

        /**
         * バイト列を PDF ファイルとしてダウンロードさせる。
         * @param {Uint8Array} bytes    PDF バイト列
         * @param {string}     filename ダウンロードファイル名
         */
        downloadPdf(bytes, filename) {
            const blob = new Blob([bytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href     = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }
    }


    /* ================================================================
     * ███████████████████████████████████████████████████████████████
     *  App — メインアプリケーション
     * ███████████████████████████████████████████████████████████████
     *
     *  UI 全体の制御を担う。以下のサブ責務を持つ:
     *
     *  [初期化]
     *    init()            : イベントリスナーの登録
     *    handleOpenDirectory / loadProject
     *
     *  [UI レンダリング]
     *    renderUI          : 全体再描画
     *    renderTree        : 左サイドバー（カテゴリツリー）
     *    showThumbnails    : 中央グリッド
     *    showInfo          : 右ペイン（書類情報フォーム）
     *    showMultiSelectSummary : 複数選択時のサマリー
     *
     *  [ドラッグ＆ドロップ]
     *    setupSortable     : SortableJS 初期化
     *    setupExternalDnD  : 外部ファイルのドロップ受付
     *    handleDocSort     : 書類のソート・移動
     *    handleCatSort     : カテゴリの並び替え
     *    handleExternalDrop: 外部ドロップ処理
     *
     *  [選択・プレビュー]
     *    handleSelection   : 単一・複数・範囲選択ロジック
     *    generateThumbnail : pdf.js によるサムネイル生成
     *
     *  [CRUD アクション]
     *    handleAddCategory / handleEditCategory / handleDeleteCategory
     *    handleSaveInfo    : 書類情報・プロジェクト設定の保存
     *    handleMergePdf    : 成果物生成
     *    handleEditStructure: フォルダ構成変更（テンプレート切替）
     * ================================================================ */
    class App {
        constructor() {
            // -- サービス層 --
            this.fs      = new FileSystemService();
            this.project = new ProjectService(this.fs);
            this.pdf     = new PdfService(this.fs);

            // -- DOM 参照 --
            this.btnOpenDir    = document.getElementById('btn-open-dir');
            this.startupView   = document.getElementById('startup-view');
            this.sidebar       = document.getElementById('sidebar');
            this.treeContainer = document.getElementById('category-tree');

            this.thumbnailView    = document.getElementById('thumbnail-view');
            this.thumbnailGrid    = document.getElementById('thumbnail-grid');
            this.thumbnailTitle   = document.getElementById('thumbnail-title');
            this.thumbnailCountLabel = document.getElementById('thumbnail-count');

            this.infoPane              = document.getElementById('info-pane');
            this.projectInfoContainer  = document.getElementById('project-info-container');
            this.documentInfoContainer = document.getElementById('document-info-container');

            // -- アプリ状態 --
            /** @type {Set<string>} 選択中の書類 ID 集合 */
            this.selectedDocIds     = new Set();
            /** @type {Set<string>} 折り畳まれたカテゴリ ID 集合 */
            this.collapsedCategoryIds = new Set();
            /** @type {string|null} 現在アクティブなカテゴリ ID */
            this.activeCategoryId   = null;
            /** @type {string|null} 最後に選択した書類 ID（Shift 選択の起点） */
            this.lastSelectedId     = null;
            this.thumbnailCache     = new Map();

            // -- 描画キュー (シリアライズ実行用) --
            this._renderTask = Promise.resolve();

            this.init();
        }

        // ──────────────────────────────────────────────
        //  初期化
        // ──────────────────────────────────────────────

        /**
         * イベントリスナーを登録し、pdf.js の Worker を設定する。
         */
        init() {
            // ヘッダーボタン
            this.btnOpenDir.addEventListener('click', () => this.handleOpenDirectory());

            const btnMerge = document.getElementById('btn-merge-pdf');
            if (btnMerge) btnMerge.addEventListener('click', () => this.handleMergePdf());

            // サイドバーボタン
            document.getElementById('btn-add-cat')
                ?.addEventListener('click', () => this.handleAddCategory());
            document.getElementById('btn-edit-structure')
                ?.addEventListener('click', () => this.handleEditStructure());



            // 右ペイン内のフォーム変更を検知して自動保存
            this.infoPane.addEventListener('change', () => this.handleSaveInfo());

            // カスタム項目追加ボタン
            document.getElementById('btn-add-custom-field')?.addEventListener('click', () => {
                const fields = this.project.metadata.config.customFields;
                if (fields.length >= 3) {
                    alert('カスタム項目は最大3つまでです。');
                    return;
                }
                const label = prompt('新しい項目の名称を入力してください');
                if (label && label.trim()) {
                    fields.push({ label: label.trim(), value: '' });
                    this.project.save();
                    this.renderUI();
                }
            });

            // pdf.js Worker
            pdfjsLib.GlobalWorkerOptions.workerSrc =
                'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

            console.log('[App] Initialized');
        }

        // ──────────────────────────────────────────────
        //  フォルダ選択・プロジェクト読み込み
        // ──────────────────────────────────────────────

        /** フォルダ選択ダイアログを開き、プロジェクトを読み込む */
        async handleOpenDirectory() {
            const handle = await this.fs.selectDirectory();
            if (handle) await this.loadProject();
        }

        /**
         * ProjectService を初期化し、UI を表示する。
         * エラー時はアラートを表示する。
         */
        async loadProject() {
            try {
                const status = await this.project.init();
                console.log(`[App] Project status: ${status}`);
                // スタートアップ画面を非表示
                this.startupView.classList.add('opacity-0', 'invisible', 'pointer-events-none');
                await this.renderUI();
            } catch (e) {
                console.error('[App] loadProject failed:', e);
                alert(
                    'プロジェクトのロード中にエラーが発生しました。\n' +
                    'ファイルのフォーマットが不正か、アクセス権がありません。\n\n' +
                    '詳細: ' + e.message,
                );
            }
        }

        // ──────────────────────────────────────────────
        //  UI レンダリング
        // ──────────────────────────────────────────────

        /**
         * UI 全体を再描画する。
         * ツリー・中央ペイン・右ペインを一括更新する。
         * （物理同期は重い処理のため、ここでは行わない）
         */
        async renderUI() {
            // 前の描画が終わってから開始するようにキューイングする
            this._renderTask = this._renderTask.then(async () => {
                if (!this.project.metadata) return;
                try {
                    const hasSelection = this.selectedDocIds.size > 0;

                // 中央ペインの表示切り替え (常にサムネイルビューを表示)
                this.thumbnailView.classList.remove('hidden');

                // レイアウト要素を表示
                this.sidebar.classList.remove('hidden');
                this.infoPane.classList.remove('hidden');
                document.getElementById('btn-merge-pdf')?.classList.remove('hidden');

                // ツリーを再描画
                await this.renderTree();

                // 右ペイン更新
                this._updateInfoPaneState();
            } catch (err) {
                console.error('[App] renderUI failed:', err);
            } finally {
                // lucide アイコンを DOM に反映
                lucide.createIcons();
            }
          });
          return this._renderTask;
        }



        /**
         * 右ペイン内のすべての情報状態（値や disabled 状態）を一括で適用する。
         * UIを作り直さないため、フォーカスなどの状態が維持される。
         * @private
         */
        _updateInfoPaneState() {
            // -- 1. 案件情報（固定項目） --
            const cfg = this.project?.metadata?.config || {};
            const prjFields = ['projectName', 'orderNumber', 'wbs', 'customer', 'user'];
            for (const key of prjFields) {
                const el = document.getElementById(`prj-${key}`);
                if (el) el.value = cfg[key] || '';
            }

            // -- 2. 案件情報（動的カスタム項目） --
            const customContainer = document.getElementById('prj-custom-fields-container');
            if (customContainer) {
                customContainer.innerHTML = '';
                const fields = cfg.customFields || [];
                
                // ボタンの表示・非表示制御
                const btnAdd = document.getElementById('btn-add-custom-field');
                if (btnAdd) btnAdd.style.display = fields.length >= 3 ? 'none' : 'block';

                fields.forEach((field, index) => {
                    const row = document.createElement('div');
                    row.className = 'group relative space-y-1';
                    row.innerHTML = `
                        <div class="flex items-center justify-between">
                            <label class="label-standard">${field.label}</label>
                            <button class="opacity-0 group-hover:opacity-100 text-[10px] font-bold text-red-500 hover:text-red-700 transition-opacity" data-index="${index}">削除</button>
                        </div>
                        <input type="text" class="custom-field-input input-standard" data-index="${index}" value="${field.value}">
                    `;
                    
                    // 削除ボタンイベント
                    row.querySelector('button').addEventListener('click', (e) => {
                        e.stopPropagation();
                        fields.splice(index, 1);
                        this.project.save();
                        this.renderUI();
                    });
                    
                    // 入力イベント（リアルタイム反映用ではないが、changeリスナーが効かないため個別対応も可。今回はフォーム全体のchangeで保存されるため最低限でOK）
                    customContainer.appendChild(row);
                });
            }

            // -- 3. 書類情報 --
            const elNumber   = document.getElementById('info-doc-number');
            const elName     = document.getElementById('info-doc-name');
            const elFileName = document.getElementById('info-filename');
            const elSize     = document.getElementById('info-file-size');

            if (this.selectedDocIds.size === 1) {
                // 単一選択時 -> 活性化して値をセット
                const id = Array.from(this.selectedDocIds)[0];
                const doc = this.project.metadata.documents.find(d => d.id === id);

                let docNumber = '';
                let docName = '';
                let fileName = '';

                if (doc) {
                    docNumber = doc.number || '';
                    docName = doc.documentName || doc.fileName || '';
                    fileName = doc.fileName || '';
                } else if (typeof id === 'string') {
                    // 未分類ファイルの場合
                    docNumber = '';
                    docName = id;
                    fileName = id;
                }

                if (elNumber)   { elNumber.value   = docNumber; elNumber.disabled   = false; }
                if (elName)     { elName.value     = docName;   elName.disabled     = false; }
                if (elFileName) { elFileName.value = fileName;  elFileName.disabled = false; }
                if (elSize)     { elSize.value     = '計算中...'; }

                // 非同期でファイルサイズを取得して反映
                this._fetchFileSize(id).then(sizeStr => {
                    // レスポンスが返ってきた時点で選択対象が変わっていなければ反映
                    if (this.selectedDocIds.size === 1 && Array.from(this.selectedDocIds)[0] === id) {
                        if (elSize) elSize.value = sizeStr;
                    }
                });

            } else {
                // 未選択、または複数選択時 -> 非活性化
                if (elNumber)   { elNumber.value   = ''; elNumber.disabled   = true; }
                if (elName)     { elName.value     = ''; elName.disabled     = true; }
                if (elFileName) { elFileName.value = ''; elFileName.disabled = true; }
                if (elSize)     { elSize.value     = ''; }
            }
        }

        async _fetchFileSize(id) {
            try {
                let fileHandle;
                const doc = this.project.metadata.documents.find(d => d.id === id);
                if (doc) {
                    const cat = this.project.metadata.categories.find(c => c.id === doc.categoryId);
                    let currentDir = this.fs.dirHandle;
                    const parts = cat.path.split('/').filter(Boolean);
                    for (const p of parts) {
                        currentDir = await currentDir.getDirectoryHandle(p);
                    }
                } else if (id.startsWith('root:')) {
                    const fileName = id.replace('root:', '');
                    fileHandle = await this.fs.dirHandle.getFileHandle(fileName);
                } else {
                    // フォールバック
                    fileHandle = await this.fs.dirHandle.getFileHandle(id);
                }
                const file = await fileHandle.getFile();
                const bytes = file.size;
                if (bytes < 1024) return bytes + ' B';
                else if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
                else return (bytes / 1048576).toFixed(1) + ' MB';
            } catch (e) {
                return '取得不可';
            }
        }

        // ──────────────────────────────────────────────
        //  ツリービュー
        // ──────────────────────────────────────────────

        /**
         * 左サイドバーのカテゴリツリーを全描画する。
         * 未分類セクション → 各カテゴリ → SortableJS 設定 の順で処理する。
         */
        async renderTree() {
            this.treeContainer.innerHTML = '';

            // -- 1. 未分類セクション (固定トップレベル) --
            const unclassifiedFiles = await this._getUnclassifiedFiles();
            if (unclassifiedFiles.length > 0) {
                const uncatEl  = this._createCategoryContainer(
                    'unclassified', '未分類', null, unclassifiedFiles.length,
                );
                const fileList = uncatEl.querySelector('.file-list');
                for (const fileName of unclassifiedFiles) {
                    const rootId = `root:${fileName}`;
                    const el = this._createFileElement({
                        id:          rootId,
                        displayName: fileName,
                        isActive:    this.selectedDocIds.has(rootId),
                        isRoot:      true,
                        onSelect:    (e) => this.handleSelection(e, rootId, 'unclassified', unclassifiedFiles),
                    });
                    fileList.appendChild(el);
                }
                this.treeContainer.appendChild(uncatEl);
                this._setupSortable(fileList, 'documents');
            }

            // -- 2. 通常カテゴリ (再帰ロード) --
            const renderLevel = (parentId, container) => {
                const levelCats = this.project.metadata.categories
                    .filter(c => c.parentId === parentId)
                    .sort((a, b) => a.displayOrder - b.displayOrder);

                for (const cat of levelCats) {
                    const allCatDocs = this.project.metadata.documents.filter(d => d.categoryId === cat.id);
                    const catEl      = this._createCategoryContainer(
                        cat.id, cat.name, null, allCatDocs.length,
                    );
                    const fileList   = catEl.querySelector('.file-list');
                    const sortedDocs = [...allCatDocs].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));

                    // 書類をレンダリング
                    for (const doc of sortedDocs) {
                        const el = this._createFileElement({
                            id:          doc.id,
                            displayName: doc.documentName || doc.fileName,
                            isActive:    this.selectedDocIds.has(doc.id),
                            onSelect:    (e) => this.handleSelection(e, doc.id, cat.id, sortedDocs),
                        });
                        fileList.appendChild(el);
                    }

                    // 子カテゴリをレンダリング (未分類以外)
                    if (!catEl.dataset.id || catEl.dataset.id !== 'unclassified') {
                        const childrenContainer = document.createElement('div');
                        childrenContainer.className = 'ml-4 category-children';
                        renderLevel(cat.id, childrenContainer);
                        catEl.appendChild(childrenContainer);
                        this._setupSortable(childrenContainer, 'categories', '>div');
                    }

                    container.appendChild(catEl);
                    this._setupExternalDnD(catEl, cat.id);
                    this._setupSortable(fileList, 'documents');
                }
            };

            renderLevel(null, this.treeContainer);

            // ルート直下のカテゴリソート
            this._setupSortable(this.treeContainer, 'categories', '>div');
        }

         */
        _createCategoryContainer(id, name, icon, count) {
            const container   = document.createElement('div');
            const isCollapsed = this.collapsedCategoryIds.has(id);
            const isRoot      = id === 'unclassified';
            container.className  = 'mb-1';
            container.dataset.id = id;

            const chevron = isCollapsed ? 'chevron-right' : 'chevron-down';
            const header  = document.createElement('div');
            header.className = 'tree-node-header group';
            header.innerHTML = `
                <i data-lucide="${chevron}" class="w-4 h-4 text-ink/20 group-hover:text-ink/60 transition-colors"></i>
                <div class="flex-1 flex items-center gap-1.5 min-w-0">
                    <span class="truncate font-bold">${name}</span>
                    <span class="text-tiny font-mono text-ink/30 bg-ink/5 px-1.5 rounded-full shrink-0 border border-ink/5">${count}</span>
                </div>
                <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    ${isRoot
                        ? `<button class="btn-rescan px-2 py-1 hover:bg-ink/10 rounded text-[10px] font-bold" title="再スキャン">更新</button>`
                        : `<button class="btn-delete-cat px-2 py-1 hover:bg-ink/10 rounded text-[10px] font-bold text-ink/40 hover:text-red-500">削除</button>`
                    }
                </div>
            `;

            // ヘッダークリック: カテゴリ選択 + 折り畳みトグル
            header.addEventListener('dblclick', (e) => {
                if (isRoot || e.target.closest('button')) return;
                this.handleEditCategory(id);
            });

            header.addEventListener('click', (e) => {
                if (e.target.closest('button')) return; // ボタンクリックは除外
                
                this.activeCategoryId = id;
                this.showThumbnails(id);
                if (this.collapsedCategoryIds.has(id)) {
                    this.collapsedCategoryIds.delete(id);
                } else {
                    this.collapsedCategoryIds.add(id);
                }
                this.renderUI();
            });

            // アクションボタンのイベント設定
            if (isRoot) {
                header.querySelector('.btn-rescan')?.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    await this.project.syncFilePositions();
                    this.renderUI();
                });
            } else {
                header.querySelector('.btn-delete-cat')?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.handleDeleteCategory(id);
                });
            }

            // ファイルリスト領域
            const fileList = document.createElement('div');
            fileList.className   = 'ml-4 border-l border-ink/5 pl-2 space-y-0.5 min-h-[5px] py-1 file-list';
            fileList.dataset.catId = id;
            if (isCollapsed) fileList.classList.add('hidden');

            container.appendChild(header);
            container.appendChild(fileList);
            return container;
        }

        /**
         * 指定カテゴリの書類をサムネイルグリッドとして中央ペインに表示する。
         * @param {string} categoryId カテゴリ ID（'unclassified' も可）
         */
        async showThumbnails(categoryId) {
            const isChanged = this.activeCategoryId !== categoryId;
            this.activeCategoryId = categoryId;
            const cat  = this.project.metadata.categories.find(c => c.id === categoryId);
            const name = categoryId === 'unclassified' ? '未分類' : (cat?.name ?? '不明');

            // 対象書類リストを収集
            let docs = [];
            if (categoryId === 'unclassified') {
                const rootFiles = await this._getUnclassifiedFiles();
                docs = rootFiles.map(f => ({ id: f, fileName: f, categoryId: 'unclassified' }));
            } else {
                docs = this.project.metadata.documents
                    .filter(d => d.categoryId === categoryId)
                    .sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
            }

            // ビュー切り替え
            this.thumbnailView.classList.remove('hidden');

            // ヘッダー更新
            this.thumbnailTitle.textContent      = name;
            this.thumbnailCountLabel.textContent = docs.length;
            this.thumbnailGrid.innerHTML = '';

            if (docs.length === 0) {
                this._renderEmptyThumbnailGrid();
                return;
            }

            // カードを生成して追加
            for (const doc of docs) {
                this.thumbnailGrid.appendChild(this._createThumbnailCard(doc, categoryId, docs));
            }
            lucide.createIcons();
        }

        /**
         * サムネイルカード要素を生成する。
         * pdf.js によるサムネイル画像の非同期読み込みも開始する。
         * @private
         */
        _createThumbnailCard(doc, categoryId, allDocs) {
            const card       = document.createElement('div');
            const iconName   = categoryId === 'unclassified'
                ? 'file'
                : this._getIconForCategory(categoryId);

            card.className = `thumb-card`; // ハイライトは renderUI で動的に追加されるため初期化不要だが一応クリア
            card.dataset.id = doc.id;
            // 選択状態のクラス付与
            if (this.selectedDocIds.has(doc.id)) card.classList.add('selected');

            card.innerHTML = `
                <div class="aspect-[3/4] bg-white rounded-2xl flex flex-col items-center justify-center border border-ink/10 overflow-hidden relative shadow-sm group-hover:border-accent/40 transition-all">
                    <!-- デフォルトアイコン / ローディング -->
                    <div class="loader-container absolute inset-0 flex items-center justify-center bg-ink/5 text-ink/20 transition-opacity duration-500">
                        <i data-lucide="${iconName}" class="w-16 h-16 stroke-[1]"></i>
                        <div class="absolute inset-0 bg-white/40 backdrop-blur-[2px] opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    </div>
                    <!-- サムネイル画像（非同期で差し替え） -->
                    <img class="thumbnail-img absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-700" alt="">
                    <!-- ホバー時のプレビューバッジ -->
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all transform scale-90 group-hover:scale-100 z-10">
                        <div class="bg-ink/80 backdrop-blur px-3 py-1.5 rounded-full text-[9px] font-black text-white flex items-center gap-1.5 shadow-xl">
                            <i data-lucide="maximize-2" class="w-3 h-3"></i>
                            PREVIEW
                        </div>
                    </div>
                </div>
                <div class="text-center">
                    <p class="text-[10px] font-bold text-ink truncate px-1 transition-colors ${isSelected ? 'text-accent' : 'group-hover:text-accent/80'}"
                       title="${doc.documentName || doc.fileName}">${doc.documentName || doc.fileName}</p>
                </div>
            `;

            // 非同期サムネイル読み込み
            this._generateThumbnail(doc, categoryId).then(dataUrl => {
                if (!dataUrl) return;
                const img    = card.querySelector('.thumbnail-img');
                const loader = card.querySelector('.loader-container');
                img.src      = dataUrl;
                img.onload   = () => {
                    img.classList.remove('opacity-0');
                    loader.classList.add('opacity-0');
                };
            });

            // クリック: 選択
            card.onclick = (e) => {
                e.stopPropagation();
                this.handleSelection(e, doc.id, categoryId, allDocs);
            };
            // ダブルクリック: 選択 (プレビューモード削除のため通常の選択と同じ扱い)
            card.ondblclick = (e) => {
                e.stopPropagation();
                this.handleSelection(e, doc.id, categoryId, allDocs);
            };

            return card;
        }

        /**
         * pdf.js を使用して PDF の第1ページをサムネイル画像（dataURL）として生成する。
         * 同一セッション内ではキャッシュを利用して二重レンダリングを防ぐ。
         * @private
         * @param {object} doc       書類オブジェクト
         * @param {string} categoryId カテゴリ ID
         * @returns {Promise<string|null>} dataURL（JPEG）、または null
         */
        async _generateThumbnail(doc, categoryId) {
            const cacheKey = doc.id;
            if (this.thumbnailCache.has(cacheKey)) return this.thumbnailCache.get(cacheKey);

            try {
                // ファイルの Object URL を取得
                let url;
                if (categoryId === 'unclassified') {
                    const fileName = doc.id.replace('root:', '');
                    url = await this.fs.readFileAsUrl(fileName);
                } else {
                    const cat = this.project.metadata.categories.find(c => c.id === categoryId);
                    url = await this.fs.readFileAsUrl(`${cat.path}/${doc.fileName}`);
                }

                // PDF を読み込んで第1ページをレンダリング
                const pdf      = await pdfjsLib.getDocument(url).promise;
                const page     = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 0.6 }); // 小さめにしてメモリ節約

                const canvas  = document.createElement('canvas');
                canvas.height = viewport.height;
                canvas.width  = viewport.width;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                this.thumbnailCache.set(cacheKey, dataUrl);
                return dataUrl;
            } catch (e) {
                console.error('[App] generateThumbnail failed', e);
                return null;
            }
        }

        /**
         * 右ペインの情報変更を保存する。
         * 案件全体設定と、単一選択時の書類情報を保存・反映する。
         */
        async handleSaveInfo() {
            if (!this.project.metadata) return;

            // -- 1. プロジェクト全体設定の更新 --
            const cfg = this.project.metadata.config;
            const configFields = ['projectName', 'orderNumber', 'wbs', 'customer', 'user'];
            for (const key of configFields) {
                const el = document.getElementById(`prj-${key}`);
                if (el) cfg[key] = el.value;
            }

            // カスタム項目の更新
            const customInputs = document.querySelectorAll('.custom-field-input');
            const fields = cfg.customFields || [];
            customInputs.forEach(input => {
                const idx = parseInt(input.dataset.index);
                if (fields[idx]) {
                    fields[idx].value = input.value;
                }
            });

            // -- 2. 単一書類選択時の個別更新 --
            if (this.selectedDocIds.size === 1) {
                const id  = Array.from(this.selectedDocIds)[0];
                const doc = this.project.metadata.documents.find(d => d.id === id);
                if (!doc) {
                    await this.project.save();
                    return; // 未分類ファイルは project.json に登録なし
                }

                const elNumber   = document.getElementById('info-doc-number');
                const elName     = document.getElementById('info-doc-name');
                const elFileName = document.getElementById('info-filename');

                const newDocNumber = elNumber?.value.trim() || '';
                const newDocName   = elName?.value.trim() || '';
                const newFileName  = Utils.norm(elFileName?.value.trim() || '');

                const oldCat = this.project.metadata.categories.find(c => c.id === doc.categoryId);

                // ファイル名変更がある場合は物理ファイルも操作
                if (Utils.norm(doc.fileName) !== newFileName && newFileName !== '') {
                    const success = await this.fs.moveAndRenameFile(
                        `${oldCat.path}/${doc.fileName}`,
                        oldCat.path,
                        newFileName,
                    );
                    if (!success) {
                        alert('ファイル名の変更に失敗しました。同名ファイルが存在するか、ファイルがロックされています。');
                        this._updateInfoPaneState();
                        return;
                    }
                    doc.fileName = newFileName;
                }

                // メタデータの更新
                doc.number       = newDocNumber;
                doc.documentName = newDocName;
            }

            // -- 3. 保存・UI 更新 --
            await this.project.syncFilePositions();
            await this.project.save();
            await this.renderTree(); // 左ペインの表示名を更新
        }

        // ──────────────────────────────────────────────
        //  選択処理
