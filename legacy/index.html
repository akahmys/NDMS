        /**
         * 書類の選択状態を更新する。
         * Ctrl/Cmd キーで個別追加・解除、Shift キーで範囲選択ができる。
         *
         * @param {MouseEvent} e         クリックイベント
         * @param {string}     id        クリックされた書類 ID
         * @param {string}     catId     所属カテゴリ ID
         * @param {Array}      items     同じカテゴリ内の書類一覧（Shift 選択の範囲特定に使用）
         */
        async handleSelection(e, id, catId, items) {
            e.stopPropagation();
            const isMulti  = e.ctrlKey || e.metaKey;
            const isRange  = e.shiftKey;

            const prevActiveCatId = this.activeCategoryId;

            // 異なるカテゴリへ移動した場合は選択をリセット
            if (this.activeCategoryId !== catId) {
                this.selectedDocIds.clear();
                this.activeCategoryId = catId;
                this.lastSelectedId   = null;
            }

            if (isRange && this.lastSelectedId) {
                const list     = items.map(item => (typeof item === 'string' ? `root:${item}` : item.id));
                const startIdx = list.indexOf(this.lastSelectedId);
                const endIdx   = list.indexOf(id);

                if (startIdx !== -1 && endIdx !== -1) {
                    const [lo, hi] = [Math.min(startIdx, endIdx), Math.max(startIdx, endIdx)];
                    list.slice(lo, hi + 1).forEach(itemId => this.selectedDocIds.add(itemId));
                } else {
                    this.selectedDocIds.clear();
                    this.selectedDocIds.add(id);
                    this.lastSelectedId = id;
                }
            } else if (isMulti) {
                if (this.selectedDocIds.has(id)) this.selectedDocIds.delete(id);
                else this.selectedDocIds.add(id);
                this.lastSelectedId = id;
            } else {
                this.selectedDocIds.clear();
                this.selectedDocIds.add(id);
                this.lastSelectedId = id;
            }

            // カテゴリが変わっている、またはサムネイルが表示されていない場合は更新
            if (prevActiveCatId !== catId || this.thumbnailView.classList.contains('hidden')) {
                await this.showThumbnails(catId);
            }

            this.renderUI();
        }

        /**
         * 選択された書類のプレビューを非同期で読み込む。
         * @private
         */


        // ──────────────────────────────────────────────
        //  ドラッグ＆ドロップ
        // ──────────────────────────────────────────────

        /**
         * SortableJS を要素に設定する。
         * @private
         * @param {HTMLElement} el       ソート対象要素
         * @param {'documents'|'categories'} group SortableJS グループ名
         * @param {string} [draggable='>*'] ドラッグ対象セレクタ
         */
        _setupSortable(el, group, draggable = '>*') {
            new Sortable(el, {
                group,
                animation:   150,
                ghostClass:  'sortable-ghost',
                draggable,
                handle:      group === 'categories' ? '.tree-node-header' : null,
                onStart: () => {
                    if (group === 'categories') this.treeContainer.classList.add('category-tree-dragging');
                },
                onEnd: (evt) => {
                    if (group === 'categories') this.treeContainer.classList.remove('category-tree-dragging');
                    group === 'documents'
                        ? this.handleDocSort(evt)
                        : this.handleCatSort(evt);
                }
            });
        }

        /**
         * OS からのファイルドロップを受け付ける外部 D&D を設定する。
         * @private
         */
        _setupExternalDnD(catEl, catId) {
            const targets = [catEl.querySelector(':first-child'), catEl.querySelector('.file-list')];
            const DND_CLASSES = ['bg-blue-50/50', 'ring-2', 'ring-blue-500/20', 'rounded-xl'];

            for (const target of targets) {
                if (!target) continue;
                target.addEventListener('dragover', (e) => {
                    if (e.dataTransfer.types.includes('Files')) {
                        e.preventDefault();
                        catEl.classList.add(...DND_CLASSES);
                    }
                });
                target.addEventListener('dragleave', () => catEl.classList.remove(...DND_CLASSES));
                target.addEventListener('drop', (e) => {
                    if (e.dataTransfer.types.includes('Files')) {
                        e.preventDefault();
                        catEl.classList.remove(...DND_CLASSES);
                        this.handleExternalDrop(e, catId);
                    }
                });
            }
        }

        /**
         * カテゴリ自体の並び替え確定時に displayOrder を更新して保存する。
         */
        async handleCatSort(evt) {
            const parentEl = evt.to;
            const parentNode = parentEl.closest('[data-id]');
            const newParentId = (parentNode && parentNode.dataset.id !== 'unclassified') ? parentNode.dataset.id : null;
            
            const draggedId = evt.item.dataset.id;
            const cat = this.project.metadata.categories.find(c => c.id === draggedId);
            
            // 親が変わった場合は物理移動とパス更新を行う
            if (cat && cat.parentId !== newParentId) {
                const success = await this.project.updateCategory(draggedId, { parentId: newParentId });
                if (!success) {
                    this.renderUI(); // 失敗したら戻す
                    return;
                }
            }

            // 同一親内の並び順を確定
            const orderedIds = [...parentEl.children]
                .filter(el => el.dataset.id && el.dataset.id !== 'unclassified')
                .map(el => el.dataset.id);
            
            orderedIds.forEach((id, index) => {
                const c = this.project.metadata.categories.find(item => item.id === id);
                if (c) c.displayOrder = index;
            });

            await this.project.save();
            this.renderUI();
        }

        /**
         * 書類の並び替え・カテゴリ間移動確定時の処理。
         *
         * ケース分岐:
         *  A. 同一カテゴリ内ソート: sortOrder を更新して保存
         *  B. 未分類 → 実カテゴリ: カテゴリフォルダへ物理移動 + addDocument
         *  C. 実カテゴリ間移動: 物理移動 + categoryId 更新
         */
        async handleDocSort(evt) {
            const fromCatId  = evt.from.dataset.catId;
            const toCatId    = evt.to.dataset.catId;
            const draggedId  = evt.item.dataset.id;
            // 未分類ファイルの場合はIDから「root:」を剥離して実ファイル名を得る
            const actualFileName = draggedId.startsWith('root:') ? draggedId.replace('root:', '') : draggedId;

            // -- A. 同一カテゴリ内ソート --
            if (fromCatId === toCatId) {
                const targetList = [...evt.to.children]
                    .map(el => el.dataset.id)
                    .filter(Boolean);
                targetList.forEach((id, index) => {
                    const d = this.project.metadata.documents.find(item => item.id === id);
                    if (d) d.sortOrder = index;
                });
                await this.project.syncFilePositions();
                await this.project.save();
                await this.renderUI();
                return;
            }

            // 複数選択中の場合は選択中の全書類を対象にする
            let idsToMove = [draggedId];
            if (this.selectedDocIds.has(draggedId) && this.selectedDocIds.size > 1) {
                idsToMove = Array.from(this.selectedDocIds);
            }
            // 内部処理用に実ファイル名/UUIDのリストを作成
            const actualIdsToMove = idsToMove.map(id => id.startsWith('root:') ? id.replace('root:', '') : id);

            // -- B. 未分類 → 実カテゴリ --
            if (fromCatId === 'unclassified') {
                for (const fileName of actualIdsToMove) {
                    const cat = this.project.metadata.categories.find(c => c.id === toCatId);
                    if (!cat) continue;
                    const success = await this.fs.moveAndRenameFile(fileName, cat.path, fileName);
                    if (success) {
                        await this.project.addDocument({
                            categoryId:   toCatId,
                            originalName: fileName,
                            fileName:     fileName,
                        });
                    }
                }
                await this.project.syncFilePositions();
                this.selectedDocIds.clear();
                this.renderUI();
                return;
            }

            // -- C. 実カテゴリ間移動 --
            const oldCat = this.project.metadata.categories.find(c => c.id === fromCatId);
            const newCat = this.project.metadata.categories.find(c => c.id === toCatId);

            for (const id of actualIdsToMove) {
                const doc = this.project.metadata.documents.find(d => d.id === id);
                if (!doc) continue;
                const success = await this.fs.moveAndRenameFile(
                    `${oldCat.path}/${doc.fileName}`,
                    newCat.path,
                    doc.fileName,
                );
                if (success) doc.categoryId = toCatId;
            }

            // 移動先の sortOrder を DOM 順で確定
            const targetList = [...evt.to.children].map(el => el.dataset.id).filter(Boolean);
            targetList.forEach((id, index) => {
                const d = this.project.metadata.documents.find(item => item.id === id);
                if (d) d.sortOrder = index;
            });

            await this.project.syncFilePositions();
            await this.project.save();
            await this.renderUI();
        }

        /**
         * OS からドロップされたファイルをカテゴリに追加する。
         *
         * ケース分岐:
         *  - 同一プロジェクト内のファイル → 物理移動 + categoryId 更新
         *  - 外部ファイル → フォルダへコピー + addDocument
         *    （同名ファイルが存在する場合は連番を付与して衝突回避）
         */
        async handleExternalDrop(e, targetCatId) {
            const items  = Array.from(e.dataTransfer.items);
            const cat    = this.project.metadata.categories.find(c => c.id === targetCatId);
            let addedAny = false;

            for (const item of items) {
                if (item.kind !== 'file') continue;
                let handle;
                try {
                    handle = await item.getAsFileSystemHandle();
                    if (!handle || handle.kind !== 'file') continue;
                } catch { continue; }

                const normName     = Utils.norm(handle.name);
                const relativePath = await this.fs.directoryHandle.resolve(handle);

                if (relativePath) {
                    // ── 内部移動 ──
                    const sourcePath = Utils.norm(relativePath.join('/'));
                    if (sourcePath === `${cat.path}/${normName}`) continue; // 同一位置はスキップ

                    const success = await this.fs.moveAndRenameFile(sourcePath, cat.path, normName);
                    if (success) {
                        const existingDoc = this.project.metadata.documents.find(
                            d => Utils.norm(d.fileName) === normName,
                        );
                        if (existingDoc) {
                            existingDoc.categoryId = targetCatId;
                        } else {
                            await this.project.addDocument({ categoryId: targetCatId, fileName: normName, originalName: normName });
                        }
                        addedAny = true;
                    }
                } else {
                    // ── 外部コピー ──
                    const file    = await handle.getFile();
                    const content = await file.arrayBuffer();

                    // 同名ファイルが存在する場合は "(1)", "(2)" ... を付加して衝突回避
                    let finalName = normName;
                    let counter   = 1;
                    const baseName = normName.replace(/\.pdf$/i, '');
                    while (await this.project.doesFileExistInCategory(targetCatId, finalName)) {
                        finalName = `${baseName} (${counter++}).pdf`;
                    }

                    const success = await this.fs.writeFile(`${cat.path}/${finalName}`, content);
                    if (success) {
                        await this.project.addDocument({ categoryId: targetCatId, fileName: finalName, originalName: normName });
                        addedAny = true;
                    }
                }
            }

            if (addedAny) {
                await this.project.syncFilePositions();
                await this.renderUI();
            }
        }

        // ──────────────────────────────────────────────
        //  CRUD アクション
        // ──────────────────────────────────────────────

        /** 新規カテゴリ追加（プロンプトで名前・コードを入力、階層対応） */
        async handleAddCategory(parentId = null) {
            const name = prompt('新規カテゴリ名を入力してください:');
            if (!name) return;
            const safeName = Utils.sanitize(name);
            try {
                await this.project.addCategory(safeName, parentId);
                this.renderUI();
            } catch (e) {
                alert('カテゴリの作成に失敗しました: ' + e.message);
            }
        }

        /** 既存カテゴリの名前・コードを編集する */
        async handleEditCategory(id) {
            const cat = this.metadata.categories.find(c => c.id === id);
            if (!cat) return;
            const newName = prompt('新しいカテゴリ名:', cat.name);
            if (!newName) return;
            try {
                await this.project.updateCategory(id, { name: Utils.sanitize(newName) });
                this.renderUI();
            } catch (e) {
                alert('更新に失敗しました: ' + e.message);
            }
        }

        /** カテゴリを削除する（内部ファイルはルートへ移動） */
        async handleDeleteCategory(id) {
            if (!confirm('このカテゴリを削除しますか？（フォルダ内のファイルはルートへ移動されます）')) return;
            try {
                await this.project.deleteCategory(id);
                this.renderUI();
            } catch (e) {
                alert('削除に失敗しました: ' + e.message);
            }
        }


        /** 未分類書類をカテゴリに分類する */
        async classifyFile(fileName, categoryId) {
            const cat = this.project.metadata.categories.find(c => c.id === categoryId);
            if (!cat) return;
            const success = await this.fs.moveAndRenameFile(fileName, cat.path, fileName);
            if (success) {
                await this.project.addDocument({ categoryId, originalName: fileName, fileName });
                await this.renderUI();
            } else {
                alert('ファイルの移動に失敗しました。');
            }
        }

        // ──────────────────────────────────────────────
        //  成果物生成
        // ──────────────────────────────────────────────

        /**
         * プロジェクト内の全 PDF を結合して成果物 PDF をダウンロードさせる。
         * 処理中はボタンをローディング状態に切り替える。
         */
        async handleMergePdf() {
            if (!this.project.metadata) return;

            const docs = this.project.metadata.documents;
            if (docs.length === 0) {
                alert('統合対象の書類がありません。');
                return;
            }

            const btn          = document.getElementById('btn-merge-pdf');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i><span>生成中...</span>`;
            lucide.createIcons();
            btn.disabled = true;

            try {
                const pdfBytes = await this.pdf.mergeProjectPdfs(
                    docs,
                    this.project.metadata.categories,
                    { title: this.project.metadata.config.projectName },
                );
                this.pdf.downloadPdf(
                    pdfBytes,
                    `${this.project.metadata.config.projectName}_統合成果物.pdf`,
                );
            } catch (err) {
                console.error('[App] handleMergePdf failed:', err);
                alert('PDF の統合に失敗しました。ファイルが他で開かれていないか確認してください。');
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled  = false;
                lucide.createIcons();
            }
        }

        // ──────────────────────────────────────────────
        //  フォルダ構成変更（テンプレート切替）
        // ──────────────────────────────────────────────

        /**
         * フォルダ構成テンプレートを変更する。
         *
         * 処理フロー:
         *  1. テンプレート選択ダイアログを表示
         *  2. 既存書類がある場合はフォルダ移行マッピングダイアログを表示
         *  3. executeTemplateMigration() で物理移動とメタデータ更新を実行
         */
        async handleEditStructure() {
            const templates    = ProjectService.TEMPLATES;
            const templateKeys = Object.keys(templates);

            // -- 1. テンプレート選択ダイアログ --
            const choice = await this._showTemplateSelectDialog(templates, templateKeys);
            if (!choice) return;

            const newTemplate    = templates[choice];
            const oldCategories  = this.project.metadata.categories;
            const hasDocs        = this.project.metadata.documents.length > 0;

            // -- 2. 移行マッピングダイアログ（既存書類がある場合） --
            if (hasDocs) {
                await this._showMappingDialog(newTemplate, oldCategories);
            } else {
                if (confirm(`「${newTemplate.name}」のフォルダ構成を適用しますか？`)) {
                    await this.executeTemplateMigration(newTemplate, null);
                }
            }
        }

        /**
         * テンプレート選択ダイアログを Promise で包んで表示する。
         * @private
         * @returns {Promise<string|null>} 選択されたテンプレートキー、またはキャンセル時 null
         */
        _showTemplateSelectDialog(templates, keys) {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal-dialog">
                        <div class="px-8 py-6 border-b border-ink/5 flex items-center justify-between bg-ink/5">
                            <h3 class="text-xl font-bold text-ink">テンプレートを選択</h3>
                            <button class="close-btn text-ink/30 hover:text-ink"><i data-lucide="x" class="w-6 h-6"></i></button>
                        </div>
                        <div class="p-8 space-y-4">
                            ${keys.map(k => `
                                <button class="template-btn w-full px-6 py-5 bg-ink/5 hover:bg-accent/5 border border-ink/10 hover:border-accent/30 rounded-2xl text-left transition-all group active:scale-[0.98]" data-key="${k}">
                                    <div class="flex items-center justify-between">
                                        <span class="font-bold text-ink/70 group-hover:text-accent">${templates[k].name}</span>
                                        <i data-lucide="chevron-right" class="w-5 h-5 text-ink/20 group-hover:text-accent/60"></i>
                                    </div>
                                </button>`).join('')}
                        </div>
                        <div class="px-8 py-4 bg-ink/5 border-t border-ink/5 flex justify-end">
                            <button class="cancel-btn px-6 py-2 rounded-xl text-sm font-bold text-ink/40 hover:text-ink">キャンセル</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);
                lucide.createIcons();

                overlay.querySelectorAll('.template-btn').forEach(btn => {
                    btn.onclick = () => { overlay.remove(); resolve(btn.dataset.key); };
                });
                overlay.querySelector('.close-btn').onclick  = () => { overlay.remove(); resolve(null); };
                overlay.querySelector('.cancel-btn').onclick = () => { overlay.remove(); resolve(null); };
            });
        }

        /**
         * 移行マッピングダイアログを表示し、確定後に executeTemplateMigration を実行する。
         * @private
         */
        _showMappingDialog(newTemplate, oldCategories) {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal-dialog !max-w-2xl">
                        <div class="px-8 py-6 border-b border-ink/5 flex items-center justify-between bg-ink/5">
                            <div>
                                <h3 class="text-xl font-bold text-ink">フォルダ構成の移行設定</h3>
                                <p class="text-xs text-ink/40 mt-1">既存フォルダを「${newTemplate.name}」のどの項目へ移動するか選択してください。</p>
                            </div>
                            <button class="close-btn text-ink/30 hover:text-ink"><i data-lucide="x" class="w-6 h-6"></i></button>
                        </div>
                        <div class="p-8 max-h-[60vh] overflow-y-auto custom-scrollbar space-y-4">
                            ${oldCategories.map(oldCat => `
                                <div class="flex items-center gap-4">
                                    <div class="flex-1 min-w-0">
                                        <div class="text-xs font-bold text-ink/30 uppercase tracking-widest mb-1">現在のフォルダ</div>
                                        <div class="text-sm font-bold text-ink bg-ink/5 px-4 py-3 rounded-2xl border border-ink/10">${oldCat.name}</div>
                                    </div>
                                    <div class="shrink-0 pt-6 text-ink/20"><i data-lucide="arrow-right" class="w-6 h-6"></i></div>
                                    <div class="flex-1 min-w-0">
                                        <div class="text-xs font-bold text-accent/60 uppercase tracking-widest mb-1">移行先</div>
                                        <select class="map-select w-full px-4 py-3 bg-accent/5 border border-accent/20 rounded-2xl text-sm font-bold text-accent outline-none" data-old-id="${oldCat.id}">
                                            ${newTemplate.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                                            <option value="ROOT">未分類（ルート直下）に移動</option>
                                        </select>
                                    </div>
                                </div>`).join('')}
                        </div>
                        <div class="px-8 py-6 bg-ink/5 border-t border-ink/5 flex justify-end gap-3">
                            <button class="cancel-btn px-6 py-2.5 rounded-xl text-sm font-bold text-ink/40 hover:bg-ink/10">キャンセル</button>
                            <button class="confirm-btn btn-ink shadow-lg">移行を実行</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);
                lucide.createIcons();

                overlay.querySelector('.close-btn').onclick  = () => { overlay.remove(); resolve(null); };
                overlay.querySelector('.cancel-btn').onclick = () => { overlay.remove(); resolve(null); };
                overlay.querySelector('.confirm-btn').onclick = async () => {
                    const mapping = {};
                    overlay.querySelectorAll('.map-select').forEach(s => {
                        mapping[s.dataset.oldId] = s.value;
                    });
                    overlay.remove();
                    await this.executeTemplateMigration(newTemplate, mapping);
                    resolve(true);
                };
            });
        }

        /**
         * テンプレート移行を実行する。
         *
         * 処理順:
         *  1. メタデータのカテゴリ定義を新テンプレートで上書き
         *  2. 新フォルダを物理的に作成
         *  3. mapping に従って書類を物理移動 + categoryId 更新
         *  4. 旧フォルダを削除
         *
         * @param {object}      newTemplate 新しいテンプレート定義
         * @param {object|null} mapping     oldCatId → newCatId のマッピング（null = 書類なし）
         */
        async executeTemplateMigration(newTemplate, mapping) {
            try {
                this._showProcessingOverlay('フォルダ構成を移行中...');

                const oldCategories = [...this.project.metadata.categories];
                const documents     = this.project.metadata.documents;

                // 1. カテゴリ定義を新テンプレートで更新
                this.project.metadata.categories = newTemplate.categories.map((c, i) => ({
                    ...c, displayOrder: i, seq: 1,
                }));

                // 2. 新フォルダを物理作成
                await this.project.createDefaultDirectories();

                // 3. 書類を物理移動（マッピングが指定されている場合）
                if (mapping) {
                    for (const oldCat of oldCategories) {
                        const targetCatId = mapping[oldCat.id];
                        const catDocs     = documents.filter(d => d.categoryId === oldCat.id);

                        for (const doc of catDocs) {
                            const sourcePath = `${oldCat.path}/${doc.fileName}`;
                            if (targetCatId === 'ROOT') {
                                // ルートへ移動（未分類として再検出される）
                                await this.fs.moveAndRenameFile(sourcePath, '', doc.fileName);
                                doc.categoryId = null;
                            } else {
                                const targetCat = newTemplate.categories.find(c => c.id === targetCatId);
                                await this.fs.moveAndRenameFile(sourcePath, targetCat.path, doc.fileName);
                                doc.categoryId = targetCatId;
                                targetCat.seq  = (targetCat.seq || 1) + 1;
                            }
                        }

                        // 4. 旧フォルダを削除（空になっているはず）
                        await this.fs.removeDirectory(oldCat.path);
                    }
                    // ルートへ移動された書類はメタデータから除去（syncFilePositions で再検出）
                    this.project.metadata.documents = documents.filter(d => d.categoryId !== null);
                }

                await this.project.syncFilePositions();
                await this.project.save();
                await this.renderUI();
                alert('完了しました。');
            } catch (e) {
                console.error('[App] executeTemplateMigration failed:', e);
                alert('エラーが発生しました: ' + e.message);
            } finally {
                this._hideProcessingOverlay();
            }
        }

        // ──────────────────────────────────────────────
        //  ユーティリティ / ヘルパー
        // ──────────────────────────────────────────────

        /**
         * ルートフォルダ直下にある未分類の PDF ファイル名一覧を返す。
         * 設定ファイル・隠しファイル・登録済みファイルを除外する。
         * @private
         */
        async _getUnclassifiedFiles() {
            try {
                const allRootFiles     = await this.fs.listFiles();
                const registeredNames  = new Set(
                    this.project.metadata.documents.map(d => Utils.norm(d.fileName)),
                );
                const EXCLUDE_LIST = [ProjectService.METADATA_FILENAME, '.DS_Store', 'Thumbs.db', 'desktop.ini'];

                return allRootFiles.filter(name => {
                    const n = Utils.norm(name);
                    return n.toLowerCase().endsWith('.pdf')
                        && !n.startsWith('.')
                        && !EXCLUDE_LIST.includes(n)
                        && !registeredNames.has(n);
                });
            } catch (e) {
                console.error('[App] _getUnclassifiedFiles failed:', e);
                return [];
            }
        }

        /**
         * カテゴリ ID に対応する Lucide アイコン名を返す。
         * @private
         */
        _getIconForCategory(id) {
            const MAP = {
                'calc':   'calculator',
                'dwg':    'pen-tool',
                'pic':    'camera',
                'output': 'package-check',
            };
            return MAP[id] ?? 'folder';
        }

        /** ローディングオーバーレイを表示する */
        _showProcessingOverlay(msg) {
            const overlay = document.createElement('div');
            overlay.id        = 'processing-overlay';
            overlay.className = 'modal-overlay z-[200] !bg-paper/80';
            overlay.innerHTML = `
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 border-4 border-ink/10 border-t-ink rounded-full animate-spin mb-4"></div>
                    <p class="text-sm font-bold text-ink">${msg}</p>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        /** ローディングオーバーレイを非表示にする */
        _hideProcessingOverlay() {
            document.getElementById('processing-overlay')?.remove();
        }
    }

    /* ================================================================
     *  エントリーポイント
     * ================================================================ */
    window.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons(); // 初期アイコンを反映
        new App();
    });

    </script>
</body>
